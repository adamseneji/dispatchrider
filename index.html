<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dispatch Booking</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: #eef2f3;
        color: #333;
      }

      header {
        background: linear-gradient(135deg, #03783a, #05a84c);
        color: #fff;
        padding: 40px 20px;
        text-align: center;
        border-bottom-left-radius: 40px;
        border-bottom-right-radius: 40px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
      }

      .container {
        width: 90%;
        max-width: 500px;
        margin: 30px auto;
        background: #fff;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0px 4px 18px rgba(0, 0, 0, 0.1);
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-bottom: 18px;
        font-size: 15px;
        background: #f9f9f9;
      }

      button {
        width: 100%;
        padding: 14px;
        font-size: 16px;
        border: none;
        color: white;
        background: #03783a;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background: #025f2d;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>NBA IKEJA RIDER APP</h1>
      <p>Fast • Reliable • Affordable</p>
    </header>

    <div class="container">
      <h2>Book a Dispatch</h2>

      <form id="bookingForm">
        <label>Full Name</label>
        <input type="text" id="name" required />

        <label>Pickup Address</label>
        <textarea id="pickup" required></textarea>

        <label>Delivery Address</label>
        <textarea id="delivery" required></textarea>

        <label>Package Description</label>
        <textarea id="package" required></textarea>

        <label>Your Phone Number</label>
        <input type="text" id="phone" required />

        <!-- ✅ ROUTE DROPDOWN ADDED -->
        <label>Select Route</label>
        <select id="route" required>
          <option value="">Select Delivery Route</option>

          <option value="Yaba-Obalende-3500">Yaba → Obalende (₦3,500)</option>
          <option value="Yaba-VI-4000">Yaba → Victoria Island (₦4,000)</option>
          <option value="Yaba-Lekki-5000">Yaba → Lekki (₦5,000)</option>

          <option value="Surulere-VI-4000">
            Surulere → Victoria Island (₦4,000)
          </option>
          <option value="Surulere-Ikoyi-4500">Surulere → Ikoyi (₦4,500)</option>
          <option value="Surulere-Lekki-5500">Surulere → Lekki (₦5,500)</option>

          <option value="Ikeja-Ikoyi-7000">Ikeja → Ikoyi (₦7,000)</option>
          <option value="Ikeja-VI-6000">
            Ikeja → Victoria Island (₦6,000)
          </option>
          <option value="Ikeja-Lekki-7000">Ikeja → Lekki (₦7,000)</option>

          <option value="Lekki-Ajah-5000">Lekki → Ajah (₦5,000)</option>
          <option value="Lekki-Sangotedo-6000">
            Lekki → Sangotedo (₦6,000)
          </option>

          <option value="Ajah-Sangotedo-2500">Ajah → Sangotedo (₦2,500)</option>
          <option value="Ajah-VGC-3000">Ajah → VGC (₦3,000)</option>

          <option value="VI-Ikoyi-2000">
            Victoria Island → Ikoyi (₦2,000)
          </option>
          <option value="Ikoyi-VI-2000">
            Ikoyi → Victoria Island (₦2,000)
          </option>

          <option value="Gbagada-Lekki-4500">Gbagada → Lekki (₦4,500)</option>
          <option value="Maryland-VI-5000">
            Maryland → Victoria Island (₦5,000)
          </option>
          <option value="Oshodi-VI-4500">
            Oshodi → Victoria Island (₦4,500)
          </option>
          <option value="Ikeja-Ogba-3000">Ikeja → Ogba (₦3,000)</option>
        </select>

        <!-- ✅ PRICE FIELD -->
        <label>Price</label>
        <input
          type="text"
          id="price"
          readonly
          placeholder="Price will show here"
        />

        <button type="submit">Submit Booking</button>
      </form>
    </div>

    <script>
      // ✅ SHOW PRICE WHEN ROUTE IS SELECTED
      const routeSelect = document.getElementById("route");
      const priceInput = document.getElementById("price");

      routeSelect.addEventListener("change", function () {
        const selected = this.value;

        if (selected) {
          const parts = selected.split("-");
          const price = parts[2];
          priceInput.value = "₦" + price;
        } else {
          priceInput.value = "";
        }
      });

      document
        .getElementById("bookingForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const bookingData = {
            name: document.getElementById("name").value,
            pickup: document.getElementById("pickup").value,
            delivery: document.getElementById("delivery").value,
            package: document.getElementById("package").value,
            phone: document.getElementById("phone").value,
            route: document.getElementById("route").value,
            price: document.getElementById("price").value,
          };

          localStorage.setItem("bookingData", JSON.stringify(bookingData));

          window.location.href = "payment.html";
        });
    </script>
  </body>
</html>
